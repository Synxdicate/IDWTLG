<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDONTWANTTOLOGIN</title>
</head>
<body>
    <h1 id="status">Work Session</h1>
    <h2 id="sessionDisplay">Session: 1 / 4</h2>
    <div>
        <label>Work (min):</label>
        <input type="number" id="workIn" value="25" min="1">
        <label>Break (min):</label>
        <input type="number" id="breakIn" value="6" min="1">
    </div>
    <br>
    <div style="font-size: 2rem; font-weight: bold;">
        <span id="display">25:00</span>
    </div>
    <br>

    <!-- button -->
    <button id="startBtn" onclick="startTimer()">Start</button>
    <button id="stopBtn" onclick="stopTimer()" disabled>Stop</button>
    <button id="resetBtn" onclick="resetTimer()">Reset All</button>
    <audio id="sound" src="bell.mp3" preload="auto"></audio>

    <script>
        let timer;
        let time;
        let isRunning = false;
        let currentSession = 1;
        let isBreak = false;
        const totalSessions = 4;

        const display = document.getElementById('display');
        const workIn = document.getElementById('workIn');
        const breakIn = document.getElementById('breakIn');
        const statusTxt = document.getElementById('status');
        const sessionTxt = document.getElementById('sessionDisplay');
        const sound = document.getElementById('sound');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');

        function updateDisplay(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            const timeString = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            display.textContent = timeString;
            document.title = `${isBreak ? 'B':'W'}${timeString}`;
        }

        function startTimer() {
            if (isRunning) return;
            
            if (time === undefined || time === null) {
                const mins = isBreak ? parseInt(breakIn.value) : parseInt(workIn.value);
                time = mins * 60;
                updateDisplay(time);
            }
            
            isRunning = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            
            workIn.disabled = true;
            breakIn.disabled = true;
            
            timer = setInterval(() => {
                time--;
                updateDisplay(time);
                
                if (time <= 0) {
                    clearInterval(timer);
                    isRunning = false;
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                    sound.play();
                    handlePhaseSwitch();
                }
            }, 1000);
        }

        function stopTimer() {
            if (!isRunning) return;
            
            clearInterval(timer);
            isRunning = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            
        }

        function handlePhaseSwitch() {
            if (!isBreak) {
                if (currentSession >= totalSessions) {
                    statusTxt.textContent = "Finished All Sessions";
                    document.title = "Done";
                    workIn.disabled = false;
                    breakIn.disabled = false;
                    time = null;
                    return;
                }
                
                isBreak = true;
                statusTxt.textContent = "Break Time";
                time = parseInt(breakIn.value) * 60;
                updateDisplay(time);
                
                if (confirm("Work session over! Start break?")) {
                    startTimer();
                } else {
                    workIn.disabled = false;
                    breakIn.disabled = false;
                }
            } else {
                isBreak = false;
                currentSession++;
                statusTxt.textContent = "Work Session";
                sessionTxt.textContent = `Session: ${currentSession} / ${totalSessions}`;
                time = parseInt(workIn.value) * 60;
                updateDisplay(time);
                
                if (confirm("Break over! Back to work?")) {
                    startTimer();
                } else {
                    workIn.disabled = false;
                    breakIn.disabled = false;
                }
            }
        }

        function resetTimer() {
            clearInterval(timer);
            isRunning = false;
            currentSession = 1;
            isBreak = false;
            time = null;
            
            startBtn.disabled = false;
            stopBtn.disabled = true;
            workIn.disabled = false;
            breakIn.disabled = false;
            
            statusTxt.textContent = "Work Session";
            sessionTxt.textContent = `Session: 1 / 4`;
            document.title = "IDONTWANTTOLOGIN";
            
            const mins = parseInt(workIn.value);
            updateDisplay(mins * 60);
        }

        window.onload = function() {
            const mins = parseInt(workIn.value);
            updateDisplay(mins * 60);
        };
    </script>
</body>
</html>
