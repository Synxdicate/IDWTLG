<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDWTLG</title>
</head>
<body>
    <div class="container" style="margin-top: 50px; text-align: center;">
	<h3 id="status">Work Session</h3>
	<h2 id="sessionDisplay">Session: 1 / 4</h2>
        <div class="inputs">
            <div><label>Work (min):</label><input type="number" id="workIn" value="25" min="1"></div>
            <div><label>Break (min):</label><input type="number" id="breakIn" value="5" min="1"></div>
        </div>
        <div >
            <div>
                <b>Work:</b>
                <button onclick="setTimer(25, false)">25 min</button>
                <button onclick="setTimer(30, false)">30 min</button>
                <button onclick="setTimer(50, false)">50 min</button>
                <button onclick="setTimer(60, false)">60 min</button>
            </div>
            <div>
                <b>Break:</b>
                <button onclick="setTimer(5, true)">5 min</button>
                <button onclick="setTimer(10, true)">10 min</button>
                <button onclick="setTimer(15, true)">15 min</button>
            </div>
        </div>
        <div class="timer" style="font-size: 2rem; margin: 20px 0; color: chocolate;">
            <span id="workDisplay">25:00</span>
            <span id="breakDisplay" style="display: none;">05:00</span>
        </div>
        
        <div class="buttons">
            <button id="startBtn" onclick="startTimer()">Start</button>
            <button style="background-color:#f44336; color: white;" id="stopBtn" onclick="stopTimer()" disabled>Stop</button>
            <button id="resetBtn" onclick="resetTimer()">Reset All</button>
        </div>

        <div>
            <button id="skipBtn" onclick="switchSession()">Skip Break</button>
        </div>
        <div style="text-align: left; margin: 20px; width: 300px; border: 1px solid black;">
            <h4 style="text-align: center;">hotkey</h4>
            <p style="color: grey; margin-left: 5px;">
            > [spacebar to start/stop time]<br>
            > [double q to reset all]
            </p>
        </div>
        <audio id="sound" src="./bell.mp3" preload="auto"></audio>
    </div>

    <script>
        let timer;
        let time;
        let isRunning = false;
        let currentSession = 1;
        let isBreak = false;
        const totalSessions = 4;
        let initialTime = 0;

        const workDisplay = document.getElementById('workDisplay');
        const breakDisplay = document.getElementById('breakDisplay');
        const workIn = document.getElementById('workIn');
        const breakIn = document.getElementById('breakIn');
        const statusTxt = document.getElementById('status');
        const sessionTxt = document.getElementById('sessionDisplay');
        const sound = document.getElementById('sound');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');

        // spacebar start/stop time
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (isRunning) {
                    stopTimer();
                } else {
                    startTimer();
                }
            }
        });
        // double q to reset all
        let q = 0;
        document.addEventListener('keydown', (e) => {
            if(e.key === 'q' || e.key === 'Q') {
                q++;
                if (q === 2) {
                    //reset all
                    resetTimer();
                    q = 0;
                }
            } else {
                q = 0;
            }
        })

        function getActiveDisplay() {
            if (isBreak) {
                workDisplay.style.display = 'none';
                breakDisplay.style.display = 'inline';
                return breakDisplay;
            } else {
                breakDisplay.style.display = 'none';
                workDisplay.style.display = 'inline';
                return workDisplay;
            }
        }

        function updateDisplay(seconds) {
            const display = getActiveDisplay();
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            const timeString = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            display.textContent = timeString;
            document.title = `${isBreak ? 'Break' : 'Work'} ${timeString}`;
        }

        function setTimer(min, forBreak) {
            if (isRunning) return;

            if (forBreak) {
                breakIn.value = min;
            } else {
                workIn.value = min;
            }

            if (forBreak === isBreak) {
                time = min * 60;
                initialTime = time;
                updateDisplay(time);
            }
        }

        function startTimer() {
            if (isRunning) return;
            if (time === undefined || time === null || time <= 0) {
                const mins = isBreak ? parseInt(breakIn.value) : parseInt(workIn.value);
                time = mins * 60;
                initialTime = time;
            }
            
            isRunning = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            workIn.disabled = true;
            breakIn.disabled = true;

            timer = setInterval(() => {
                time--;
                updateDisplay(time);
                if (time <= 0) {
                    clearInterval(timer);
                    isRunning = false;
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                    sound.play().catch(e => console.log("Audio play failed")); 
                    handlePhaseSwitch();
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timer);
            isRunning = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        function handlePhaseSwitch() {
            if (!isBreak) {
                if (currentSession >= totalSessions) {
                    statusTxt.textContent = "Finished!";
                    return;
                }
                isBreak = true;
                statusTxt.textContent = "Break Time";
                time = parseInt(breakIn.value) * 60;
            } else {
                isBreak = false;
                currentSession++;
                statusTxt.textContent = "Work Session";
                sessionTxt.textContent = `Session: ${currentSession} / ${totalSessions}`;
                time = parseInt(workIn.value) * 60;
            }
            initialTime = time;
            updateDisplay(time);
            
            setTimeout(() => {
                if (confirm(isBreak ? "Work over! Start break?" : "Break over! Back to work?")) {
                    startTimer();
                }
            }, 500);
        }

        function resetTimer() {
            stopTimer();
            currentSession = 1;
            isBreak = false;
            time = null;
            initialTime = 0;
            workIn.disabled = false;
            breakIn.disabled = false;
            statusTxt.textContent = "Work Session";
            sessionTxt.textContent = `Session: 1 / 4`;
            updateDisplay(parseInt(workIn.value) * 60);
        }

        function switchSession(){
            clearInterval(timer);
            isRunning = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            handlePhaseSwitch();
        }

        updateDisplay(parseInt(workIn.value) * 60);

    </script>
</body>
</html>
