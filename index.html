<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDWTLG</title>
</head>
<body>
    <div class="container" style="margin-top: 50px; text-align: center;">
        <h2 id="sessionDisplay">Session: 1 / 4</h2>
        <h3 id="status">Work Session</h3>
        
        <div class="inputs">
            <div><label>Work (min):</label><input type="number" id="workIn" value="25" min="1"></div>
            <div><label>Break (min):</label><input type="number" id="breakIn" value="5" min="1"></div>
        </div>
        
        <div class="timer" style="font-size: 2rem; margin: 20px 0;">
            <span id="display"></span>
        </div>

        <div class="buttons">
            <button id="startBtn" onclick="startTimer()">Start</button>
            <button id="stopBtn" onclick="stopTimer()" disabled>Stop</button>
            <button id="resetBtn" onclick="resetTimer()">Reset All</button>
        </div>
        <audio id="sound" src="./bell.mp3" preload="auto"></audio>
    </div>

    <script>
        let timer;
        let time;
        let isRunning = false;
        let currentSession = 1;
        let isBreak = false;
        const totalSessions = 4;
        let initialTime = 0;

        const display = document.getElementById('display');
        const workIn = document.getElementById('workIn');
        const breakIn = document.getElementById('breakIn');
        const statusTxt = document.getElementById('status');
        const sessionTxt = document.getElementById('sessionDisplay');
        const sound = document.getElementById('sound');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');

        function updateDisplay(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            const timeString = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            display.textContent = timeString;
            document.title = `${isBreak ? 'Break':'Work'} ${timeString}`;
        }

        function startTimer() {
            if (isRunning) return;
            if (time === undefined || time === null || time <= 0) {
                const mins = isBreak ? parseInt(breakIn.value) : parseInt(workIn.value);
                time = mins * 60;
                initialTime = time;
            }
            
            isRunning = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            workIn.disabled = true;
            breakIn.disabled = true;

            timer = setInterval(() => {
                time--;
                updateDisplay(time);
                if (time <= 0) {
                    clearInterval(timer);
                    isRunning = false;
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                    sound.play().catch(e => console.log("Audio play failed")); 
                    handlePhaseSwitch();
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timer);
            isRunning = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        function handlePhaseSwitch() {
            if (!isBreak) {
                if (currentSession >= totalSessions) {
                    statusTxt.textContent = "Finished!";
                    return;
                }
                isBreak = true;
                statusTxt.textContent = "Break Time";
                time = parseInt(breakIn.value) * 60;
            } else {
                isBreak = false;
                currentSession++;
                statusTxt.textContent = "Work Session";
                sessionTxt.textContent = `Session: ${currentSession} / ${totalSessions}`;
                time = parseInt(workIn.value) * 60;
            }
            initialTime = time;
            updateDisplay(time);
            
            setTimeout(() => {
                if (confirm(isBreak ? "Work over! Start break?" : "Break over! Back to work?")) {
                    startTimer();
                }
            }, 500);
        }

        function resetTimer() {
            stopTimer();
            currentSession = 1;
            isBreak = false;
            time = null;
            initialTime = 0;
            workIn.disabled = false;
            breakIn.disabled = false;
            statusTxt.textContent = "Work Session";
            sessionTxt.textContent = `Session: 1 / 4`;
            updateDisplay(parseInt(workIn.value) * 60);
        }
    </script>
</body>
</html>
